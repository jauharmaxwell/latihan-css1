<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 7</title>
</head>
<body>
    <h3>Soal 7a</h3>
    <img src="Luffy.jpg" style="width: 200px; border-radius: 15px;">
    <br>

    <h3>Soal 7b</h3>
    <div style="width:200px; height:200px; display:flex; justify-content:center; align-items:center;">
    <img src="Luffy.jpg" style="width:200px; height:200px; object-fit:cover;">
    </div>
    <br>

    <h3>Soal 7c</h3>
    <img src="Luffy.jpg" style="width:200px; height:200px; border-radius:50%; object-fit:cover;">

    <h3>Soal 7d</h3>
    <input type="text" placeholder="Search" 
       style="border: 1px solid #ccc; 
              border-radius: 10px; 
              padding: 8px;">
    <br>

    <h3>Soal 7e</h3>
    <input type="text" placeholder="Search Google or type a URL" 
       style="border: none; 
              box-shadow: 0 2px 5px rgba(0,0,0,0.2); 
              padding: 10px; 
              width: 250px;
              border-radius: 25px;">
    <br>

    <h3>Soal 7f</h3>
    Email <br>
    <input type="text" placeholder=" " 
       style="border: 1px solid #ccc; 
              border-radius: 4px; 
              padding: 8px; 
              width: 250px;"><br>

    <p style="font-size: 12px; color: #555;">
    By clicking Agree & Join, you agree to the Privacy Policy.
    </p>

    <button style="background-color: #0073b1; 
               color: white; 
               border: none; 
               padding: 10px 20px; 
               border-radius: 25px;
               width: 279px;">
    Agree & Join
    </button>
    <br>

    <h3>Soal 7g</h3>
    <div style="display: flex; align-items: center; 
            border: 1px solid #ccc; 
            padding: 8px; 
            width: 400px;">
  
  <img src="Luffy.jpg" alt="Profile" 
       style="width: 40px; height: 40px; 
              border-radius: 50%; 
              margin-right: 10px;">
  
  <input type="text" placeholder="What's happening?" 
         style="flex: 1; border: none; outline: none;">
  
  <button style="background-color: #1da1f2; 
                 color: white; 
                 border: none; 
                 padding: 8px 16px; 
                 border-radius: 20px; 
                 margin-left: 10px;">
                Tweet
  </button>
</div>
</body>
</html>
